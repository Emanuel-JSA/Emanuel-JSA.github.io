<!-- themes/seu_tema/layouts/index.html -->
<!DOCTYPE html>
<html>
<head>
    <title>{{ .Site.Title }}</title>
</head>
<body>
    <h1>{{ .Site.Title }}</h1>
    {{ range .Site.RegularPages.ByDate.Reverse }}
        <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
        <p>{{ .Summary }}</p>
        <p>Publicado em: {{ .Date.Format "02 Jan 2006" }}</p>
    {{ end }}
</body>
</html>
