<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Te amo bebe</title>
  <style>
    body {
      margin: 0;
      overflow: hidden; 
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .love-text {
      position: absolute;
      color: black;
      font-size: 3rem;
      z-index: 1; 
      text-align: center;
      cursor: pointer; 
      user-select: none; 
      transition: opacity 0.5s ease-out;
    }

    .click-hint {
      position: absolute;
      bottom: 20px;
      background-color: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 1rem;
      z-index: 2; 
      opacity: 0.8;
      animation: pulse 1s infinite; 
      user-select: none;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.8;
      }
      50% {
        transform: scale(1.1);
        opacity: 1;
      }
      100% {
        transform: scale(1);
        opacity: 0.8;
      }
    }

    .emoji {
      position: absolute;
      top: -50px;
      font-size: 2rem;
      opacity: 0.8;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0% {
        transform: translateY(0) rotate(0deg);
      }
      100% {
        transform: translateY(100vh) rotate(360deg);
      }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-30px); }
    }

    @keyframes scale {
      0% { transform: scale(1); }
      50% { transform: scale(1.5); }
      100% { transform: scale(1); }
    }

    @keyframes flip {
      0% { transform: rotateY(0); }
      50% { transform: rotateY(180deg); }
      100% { transform: rotateY(0); }
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(5deg); }
      75% { transform: rotate(-5deg); }
    }
  </style>
</head>
<body>
  <div class="love-text">Amor não linear</div>

  <div class="click-hint">Clica em qualquer lugar da tela amor</div>

  <script>
    const emojis = ['🌸', '🌹', '❤️', '💖', '💐', '🌺'];

    const texts = [
    'É estranho racionalizar',
    'Será que a gente precisa?',
    'Precisa sim!',
    'Talvez não precisa! Mas eu quero',
    'Eu quero te amar',
    'Eu amo te amar',
    'Eu amo te amar',
    'Eu amo te amar',
    'Como você vai experienciar?',
    'Não tem instruções',
    'O Glória!',
    '? Será?? ',
    'SIM!!!',
    'O nosso amor é:',
    'Irado',
    'Gosmento',
    'Maluco',
    'Hur dur aqui pra vc ó',
    'KKKKKK ta lendo mesmo',
    '👉👌',
    '😹😹😹😹',
    '😋',
    '🤭🤭🤭🤭',
    'eu quando amanda flores ->🙄🙄',
    '😈😈😈',
    'Cega safada',
    '🫦🫦🫦',
    ];

    const animations = ['spin', 'bounce', 'scale', 'flip', 'wobble'];

    let textIndex = 0;

    function createEmoji() {
      const emoji = document.createElement('div'); 
      emoji.classList.add('emoji'); 
      emoji.textContent = emojis[Math.floor(Math.random() * emojis.length)]; 

      emoji.style.left = Math.random() * 100 + 'vw';
      emoji.style.animationDuration = Math.random() * 3 + 2 + 's'; 
      emoji.style.fontSize = Math.random() * 24 + 16 + 'px'; 

      document.body.appendChild(emoji); 

      setTimeout(() => {
        emoji.remove();
      }, 5000);
    }

    function applyRandomAnimation(element) {
 
      const animation = animations[Math.floor(Math.random() * animations.length)];
      element.style.animation = `${animation} 1s ease-in-out`;


      element.addEventListener('animationend', () => {
        element.style.animation = ''; 
      });
    }


    document.querySelector('body').addEventListener('click', () => {
      textIndex = Math.floor(Math.random() * texts.length);
      const loveText = document.querySelector('.love-text');

      loveText.style.opacity = 0;
      setTimeout(() => {
        loveText.textContent = texts[textIndex];
        loveText.style.opacity = 1;
        applyRandomAnimation(loveText);
      }, 500);

      const clickHint = document.querySelector('.click-hint');
      if (clickHint) {
        clickHint.style.display = 'none';
      }
    });

    setInterval(createEmoji, 200);
  </script>
</body>
</html>
